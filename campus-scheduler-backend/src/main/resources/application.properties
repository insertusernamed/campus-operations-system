spring.application.name=campus-operations-system
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/campusdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Ensure Hibernate creates tables before data.sql runs
spring.jpa.defer-datasource-initialization=true

# Keep seed data available for demos without wiping any existing rows.
spring.sql.init.mode=always

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS allowed origins (comma-separated). Override with CORS_ALLOWED_ORIGINS env var.
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,https://campus-operations-system.vercel.app

# Demo reproducibility
demo.generation.seed=20260402
demo.solver.seed=20260402

# Timefold Solver Configuration
timefold.solver.termination.spent-limit=30s
solver.unimproved-limit=10s
