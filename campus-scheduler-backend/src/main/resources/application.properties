spring.application.name=campus-scheduler
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/campusdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Ensure Hibernate creates tables before data.sql runs
spring.jpa.defer-datasource-initialization=true

# Keep seed data available for demos without wiping any existing rows.
spring.sql.init.mode=always

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Timefold Solver Configuration
timefold.solver.termination.spent-limit=30s
solver.unimproved-limit=10s
